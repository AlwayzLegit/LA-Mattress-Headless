name: tmp — probe brand logo SVGs

# TEMPORARY (2026-07-19): one-shot probe. The build sandbox is egress-
# blocked, so this prints the two new brand-logo SVGs' root <svg> tags
# (intrinsic dimensions / viewBox) and checks for embedded raster data.
# Deleted right after it runs.

on:
  push:
    branches:
      - claude/diamond-mattress-orphaned-pages-rdc6r7
    paths:
      - '.github/workflows/tmp-svg-probe.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Probe SVGs
        run: |
          for u in \
            "https://cdn.shopify.com/s/files/1/0684/1759/files/brand-brooklyn-bedding-mattresses.svg?v=1784476368" \
            "https://cdn.shopify.com/s/files/1/0684/1759/files/brand-birch-mattresses.svg?v=1784476368"; do
            echo "=== $u"
            code=$(curl -sS -o /tmp/f.svg -w "%{http_code}" -H "Accept: image/svg+xml" "$u")
            echo "HTTP $code, $(wc -c < /tmp/f.svg) bytes, content-type: $(curl -sSI "$u" | grep -i '^content-type' | tr -d '\r')"
            tr '\n' ' ' < /tmp/f.svg | grep -o '<svg[^>]*>' | head -1
            echo "embedded raster: $(grep -c 'data:image\|<image' /tmp/f.svg || true)"
          done
